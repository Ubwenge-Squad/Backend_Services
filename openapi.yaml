        batchSize: { type: number }

    ScoreBreakdown:
      type: object
      properties:
        skills: { type: number }
        experience: { type: number }
        education: { type: number }
        relevance: { type: number }
    WeightConfig:
      type: object
      properties:
        skills: { type: number }
        experience: { type: number }
        education: { type: number }
        relevance: { type: number }

    ScreeningResult:
      type: object
      properties:
