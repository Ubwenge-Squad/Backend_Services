        biasWarningDismissedBy: { type: string, nullable: true }
        responseTimeMinutes: { type: number, nullable: true }
        predictedJoinProbability: { type: number, nullable: true }
        counterOfferRisk: { type: number, nullable: true }
        counterfactualScenarios:
          nullable: true
        featureAttribution:
          nullable: true
        adjacentRoles:
          type: array
          items: { type: string }
        upskillingPaths:
          type: array
          items:
            type: object
